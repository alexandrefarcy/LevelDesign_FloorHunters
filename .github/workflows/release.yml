# .github/workflows/release.yml
#
# Declenchement :
#   git tag v1.x.x
#   git push --tags

name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 networkx pyinstaller pillow

      - name: Generate icon
        run: python generate_icon.py

      - name: Build with PyInstaller
        run: pyinstaller tower_dungeon.spec
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Install Inno Setup
        run: choco install innosetup --yes
        shell: pwsh

      - name: Compile installer
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$version installer.iss
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Tower Dungeon Level Editor ${{ github.ref_name }}"
          body: |
            ## Tower Dungeon Level Editor ${{ github.ref_name }}

            ### Installation
            1. Telecharger `TowerDungeonLevelEditor_Setup_${{ github.ref_name }}.exe`
            2. Double-cliquer dessus
            3. Choisir le dossier d'installation
            4. Lancer l'application via le raccourci cree sur le Bureau

            **Aucune installation de Python requise.**
          files: Output/TowerDungeonLevelEditor_Setup_${{ github.ref_name }}.exe
          draft: false
          prerelease: false

# .github/workflows/release.yml
#
# Workflow GitHub Actions -- Build et release automatique
#
# Declenchement : quand tu pushs un tag de version
#   git tag v1.0.0
#   git push --tags
#
# Ce workflow va :
#   1. Cloner le repo
#   2. Installer Python 3.12 + dependances
#   3. Generer l'icone (Pillow)
#   4. Builder l'exe avec PyInstaller (onedir)
#   5. Zipper le dossier de build
#   6. Creer une GitHub Release et uploader le zip

name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"   # ex: v1.0.0, v1.2.3

permissions:
  contents: write   # necessaire pour creer la Release

jobs:
  build:
    runs-on: windows-latest   # build Windows natif

    steps:
      # ------------------------------------------------------------------
      # 1 - Checkout du code
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2 - Installation Python 3.12
      # ------------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ------------------------------------------------------------------
      # 3 - Installation des dependances
      # ------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 networkx pyinstaller pillow

      # ------------------------------------------------------------------
      # 4 - Generation de l'icone
      # ------------------------------------------------------------------
      - name: Generate icon
        run: python generate_icon.py

      # ------------------------------------------------------------------
      # 5 - Build PyInstaller
      # ------------------------------------------------------------------
      - name: Build with PyInstaller
        run: pyinstaller tower_dungeon.spec

      # ------------------------------------------------------------------
      # 6 - Zipper le build
      # ------------------------------------------------------------------
      - name: Zip build
        run: |
          $version = "${{ github.ref_name }}"
          $zipName = "TowerDungeonLevelEditor_${version}_Windows.zip"
          Compress-Archive -Path dist\TowerDungeonLevelEditor\* -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
        shell: pwsh

      # ------------------------------------------------------------------
      # 7 - Creer la GitHub Release et uploader le zip
      # ------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Tower Dungeon Level Editor ${{ github.ref_name }}"
          body: |
            ## Tower Dungeon Level Editor ${{ github.ref_name }}

            ### Installation
            1. Telecharger `TowerDungeonLevelEditor_${{ github.ref_name }}_Windows.zip`
            2. Extraire le zip
            3. Double-cliquer sur `TowerDungeonLevelEditor.exe`

            **Aucune installation de Python requise.**
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
